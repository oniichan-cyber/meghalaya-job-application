<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Meghalaya Job</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <h1>Admin Dashboard</h1>
        <p>Total Applications: {{ applications|length }}</p>
        
        <div class="admin-controls">
            <button onclick="selectAll()" class="control-btn">Select All</button>
            <button onclick="deselectAll()" class="control-btn">Deselect All</button>
            <button onclick="printSelected()" class="control-btn">Print Selected</button>
            <button onclick="deleteSelected()" class="control-btn" style="background-color: #e74c3c;">Delete Selected</button>
            <button onclick="exportToExcel()" class="control-btn">Export to Excel</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Select</th>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Photo</th>
                    <th>Date Submitted</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr>
                    <td><input type="checkbox" class="applicant-checkbox" data-id="{{ app[0] }}"></td>
                    <td>{{ app[0] }}</td>
                    <td>{{ app[1] }}</td>
                    <td>{{ app[2] }}</td>
                    <td>{{ app[3] }}</td>
                    <td>
                        {% if app[4] %}
                        <a href="{{ url_for('static', filename='uploads/' + app[4]) }}" target="_blank">
                            <img src="{{ url_for('static', filename='uploads/' + app[4]) }}" alt="Photo" style="max-width: 60px; max-height: 60px; border-radius: 5px; border: 1px solid #ddd;">
                        </a>
                        {% else %}
                        <span style="color: #999;">No Photo</span>
                        {% endif %}
                    </td>
                    <td>{{ app[5] }}</td>
                    <td>
                        <button onclick="deleteSingle({{ app[0] }})" class="delete-btn" style="background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">Delete</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        
        <br>
        <a href="/" class="submit-btn">Go to Home</a>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
